version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - APP_NAME=Student Tracker
      - DB_PATH=/app/data/student_tracker.db
      - SECRET_KEY=change-this-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - MASTER_PASSWORD=RESET-admin-2024
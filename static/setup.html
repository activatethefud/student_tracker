<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - Student Tracker</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Welcome to Student Tracker</h1>
            <p class="text-gray-600 mt-2">Create your admin account to get started</p>
        </div>
        
        <form hx-post="/api/init-admin" hx-target="#result" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" name="username" required
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter username">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter password">
            </div>
            
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Confirm password">
            </div>
            
            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">
                Create Admin Account
            </button>
        </form>
        
        <div id="result" class="mt-4"></div>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <a href="/" class="text-blue-500 hover:underline">Go to Login</a>
        </div>
    </div>
    
    <script>
        document.querySelector('form').addEventListener('htmx:afterRequest', function(evt) {
            const result = document.getElementById('result');
            if (result.innerHTML.includes('success')) {
                setTimeout(function() {
                    window.location.href = '/';
                }, 1500);
            }
        });
    </script>
</body>
</html>

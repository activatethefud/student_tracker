<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Student Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="p-3 sm:p-4 md:p-6">
    <div class="max-w-sm sm:max-w-md md:max-w-2xl lg:max-w-3xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-4 sm:p-6">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-2">
                <h1 class="text-xl sm:text-2xl font-bold">Students</h1>
                <a href="/" class="text-blue-500 hover:underline text-sm sm:text-base">← Back to Chat</a>
            </div>
            
            {% if students %}
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {% for student in students %}
                <a href="/student/{{ student.name }}" 
                   class="block p-4 border rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-colors">
                    <span class="font-medium text-lg">{{ student.name }}</span>
                    {% if student.details %}
                    <p class="text-sm text-gray-500 mt-1 truncate">{{ student.details }}</p>
                    {% endif %}
                </a>
                {% endfor %}
            </div>
            {% else %}
            <p class="text-gray-500 text-center py-8">No students found. Add students using the chat interface.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>

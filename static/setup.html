<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - Student Tracker</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Welcome to Student Tracker</h1>
            <p class="text-gray-600 mt-2">Create your admin account to get started</p>
        </div>
        
        <form id="admin-form" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" name="username" required minlength="2"
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Choose a username">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="At least 6 characters">
            </div>
            
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Re-enter password">
            </div>
            
            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition font-medium">
                Create Admin Account
            </button>
        </form>
        
        <div id="result" class="mt-4"></div>
        
        <hr class="my-6">
        
        <div class="bg-yellow-50 border border-yellow-200 rounded p-3">
            <p class="text-sm text-yellow-800 font-medium">Already have an account?</p>
            <a href="/" class="text-sm text-blue-500 hover:underline">Go to Login</a>
        </div>
    </div>
    
    <script>
        document.getElementById('admin-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                document.getElementById('result').innerHTML = '<div class="text-red-500 text-sm">Passwords do not match</div>';
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="text-gray-500 text-sm">Creating account...</div>';
            
            try {
                const response = await fetch('/api/setup-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.access_token) {
                        localStorage.setItem('student_tracker_token', data.access_token);
                    }
                    resultDiv.innerHTML = '<div class="text-green-500 text-sm">' + data.message + '</div>';
                    setTimeout(function() {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    resultDiv.innerHTML = '<div class="text-red-500 text-sm">' + data.message + '</div>';
                }
            } catch (err) {
                resultDiv.innerHTML = '<div class="text-red-500 text-sm">Error: ' + err.message + '</div>';
            }
        });
    </script>
</body>
</html>

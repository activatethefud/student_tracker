<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - Student Tracker</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Welcome to Student Tracker</h1>
            <p class="text-gray-600 mt-2">Create your admin account to get started</p>
        </div>
        
        <form id="admin-form" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" name="username" required
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter username">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter password">
            </div>
            
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       class="mt-1 block w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Confirm password">
            </div>
            
            <hr class="my-4">
            
            <div class="bg-yellow-50 border border-yellow-200 rounded p-3">
                <p class="text-sm text-yellow-800 font-medium">Reset existing admin?</p>
                <p class="text-xs text-yellow-600 mb-2">Enter master password to reset</p>
                <input type="password" id="master_password" name="master_password"
                       class="w-full border rounded px-3 py-2 text-sm"
                       placeholder="Master password (optional)">
            </div>
            
            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">
                Create Admin Account
            </button>
        </form>
        
        <div id="result" class="mt-4"></div>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            <a href="/" class="text-blue-500 hover:underline">Go to Login</a>
        </div>
    </div>
    
    <script>
        document.getElementById('admin-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const masterPassword = document.getElementById('master_password').value;
            
            if (password !== confirmPassword) {
                document.getElementById('result').innerHTML = '<div class="text-red-500">Passwords do not match</div>';
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="text-gray-500">Processing...</div>';
            
            let url = '/api/init-admin?username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password);
            if (masterPassword) {
                url = '/api/reset-admin?username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password) + '&master_password=' + encodeURIComponent(masterPassword);
            }
            
            try {
                const response = await fetch(url, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = '<div class="text-green-500">' + data.message + '</div>';
                    setTimeout(function() {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    resultDiv.innerHTML = '<div class="text-red-500">' + data.message + '</div>';
                }
            } catch (err) {
                resultDiv.innerHTML = '<div class="text-red-500">Error: ' + err.message + '</div>';
            }
        });
    </script>
</body>
</html>
